---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rate-limiter
  labels:
    app: rate-limiter
spec:
  replicas: {{ .Values.rateLimiter.replicaCount }}
  selector:
    matchLabels:
      app: rate-limiter
  template:
    metadata:
      labels:
        app: rate-limiter
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: rate-limiter
          image: "{{ .Values.rateLimiter.image }}:{{ .Values.global.imageTag }}"
          ports:
            - containerPort: {{ .Values.rateLimiter.port }}
          env:
            - name: LISTEN_ADDR
              value: "0.0.0.0:{{ .Values.rateLimiter.port }}"
            - name: UPSTREAM_URL
              value: "http://fake-api:{{ .Values.fakeApi.port }}"
            - name: REDIS_URL
              value: "redis://redis:{{ .Values.redis.port }}"
            - name: RATE_LIMIT
              value: {{ .Values.rateLimiter.env.rateLimit | quote }}
            - name: WINDOW_SECONDS
              value: {{ .Values.rateLimiter.env.windowSeconds | quote }}
            - name: RUST_LOG
              value: {{ .Values.rateLimiter.env.rustLog | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.rateLimiter.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rate-limiter
  labels:
    app: rate-limiter
spec:
  selector:
    app: rate-limiter
  ports:
    - port: {{ .Values.rateLimiter.port }}
      targetPort: {{ .Values.rateLimiter.port }}
{{- if .Values.rateLimiter.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rate-limiter
  labels:
    app: rate-limiter
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rate-limiter
  minReplicas: {{ .Values.rateLimiter.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.rateLimiter.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.rateLimiter.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}