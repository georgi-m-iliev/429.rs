---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-fake-api
  labels:
    app: {{ .Release.Name }}-fake-api
    {{- include "429rs.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.fakeApi.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-fake-api
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-fake-api
    spec:
      containers:
        - name: fake-api
          image: {{ .Values.fakeApi.image }}:{{ .Values.global.imageTag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.fakeApi.port }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.fakeApi.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.fakeApi.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-fake-api
  labels:
    {{- include "429rs.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ .Release.Name }}-fake-api
  ports:
    - port: {{ .Values.fakeApi.port }}
      targetPort: {{ .Values.fakeApi.port }}
