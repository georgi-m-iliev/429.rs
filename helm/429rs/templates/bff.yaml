---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-bff
  labels:
    app: {{ .Release.Name }}-bff
    {{- include "429rs.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.bff.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-bff
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-bff
    spec:
      containers:
        - name: bff
          image: {{ .Values.bff.image }}:{{ .Values.global.imageTag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.bff.port }}
          env:
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis:{{ .Values.redis.port }}"
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.bff.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.bff.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-bff
  labels:
    {{- include "429rs.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ .Release.Name }}-bff
  ports:
    - port: {{ .Values.bff.port }}
      targetPort: {{ .Values.bff.port }}
