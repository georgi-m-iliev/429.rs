---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-rate-limiter
  labels:
    app: {{ .Release.Name }}-rate-limiter
    {{- include "429rs.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.rateLimiter.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-rate-limiter
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-rate-limiter
    spec:
      containers:
        - name: rate-limiter
          image: {{ .Values.rateLimiter.image }}:{{ .Values.global.imageTag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.rateLimiter.port }}
          env:
            - name: LISTEN_ADDR
              value: "0.0.0.0:{{ .Values.rateLimiter.port }}"
            - name: UPSTREAM_URL
              value: "http://{{ .Release.Name }}-fake-api:{{ .Values.fakeApi.port }}"
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis:{{ .Values.redis.port }}"
            - name: RATE_LIMIT
              value: {{ .Values.rateLimiter.env.rateLimit | quote }}
            - name: WINDOW_SECONDS
              value: {{ .Values.rateLimiter.env.windowSeconds | quote }}
            - name: RUST_LOG
              value: {{ .Values.rateLimiter.env.rustLog | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.rateLimiter.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.rateLimiter.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-rate-limiter
  labels:
    {{- include "429rs.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ .Release.Name }}-rate-limiter
  ports:
    - port: {{ .Values.rateLimiter.port }}
      targetPort: {{ .Values.rateLimiter.port }}
{{- if .Values.rateLimiter.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-rate-limiter
  labels:
    {{- include "429rs.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-rate-limiter
  minReplicas: {{ .Values.rateLimiter.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.rateLimiter.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.rateLimiter.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
