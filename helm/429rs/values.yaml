# Default values for 429rs Helm chart.
# Override values in a values-override.yaml or via --set flags.

global:
  imageTag: latest
  imagePullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Redis
# ---------------------------------------------------------------------------
redis:
  enabled: true
  image: redis:7-alpine
  port: 6379
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ---------------------------------------------------------------------------
# Fake API (upstream target service)
# ---------------------------------------------------------------------------
fakeApi:
  replicaCount: 1
  image: 429rs-fake-api
  port: 8000
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ---------------------------------------------------------------------------
# Rate Limiter (Rust gateway)
# ---------------------------------------------------------------------------
rateLimiter:
  replicaCount: 2
  image: 429rs-rate-limiter
  port: 3000
  env:
    rateLimit: "100"
    windowSeconds: "60"
    rustLog: "rate_limiter=info"
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# ---------------------------------------------------------------------------
# BFF (FastAPI)
# ---------------------------------------------------------------------------
bff:
  replicaCount: 1
  image: 429rs-bff
  port: 8001
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "128Mi"

# ---------------------------------------------------------------------------
# UI (React / nginx)
# ---------------------------------------------------------------------------
ui:
  replicaCount: 1
  image: 429rs-ui
  port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: nginx
  annotations: {}
  # gateway host routes traffic through the rate-limiter
  gatewayHost: gateway.example.com
  # dashboard host routes traffic to the UI
  dashboardHost: dashboard.example.com
